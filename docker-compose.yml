version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: hireguard_postgres
    restart: always
    environment:
      POSTGRES_USER: hireguard
      POSTGRES_PASSWORD: hireguard
      POSTGRES_DB: hireguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: hireguard_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: hireguard_frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - .:/app

volumes:
  postgres_data: